<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🃏 卡牌RPG - 抽卡打Boss</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }

        .game-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .player-stats {
            display: flex;
            gap: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: bold;
            color: #00d9ff;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #8892b0;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-draw {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
        }

        .btn-draw:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.4);
        }

        .btn-attack {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: #1a1a2e;
        }

        .btn-attack:hover {
            transform: translateY(-2px);
        }

        .btn-gm {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        /* Battle Area */
        .battle-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card-box, .boss-box {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card-box {
            border: 2px solid rgba(0, 217, 255, 0.3);
        }

        .boss-box {
            border: 2px solid rgba(255, 107, 107, 0.3);
        }

        .card {
            width: 120px;
            height: 170px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: cardFlip 0.5s ease;
        }

        @keyframes cardFlip {
            0% { transform: rotateY(180deg) scale(0.5); opacity: 0; }
            100% { transform: rotateY(0deg) scale(1); opacity: 1; }
        }

        .card.common { background: linear-gradient(135deg, #b8b8b8, #7a7a7a); }
        .card.rare { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .card.epic { background: linear-gradient(135deg, #a855f7, #7c3aed); }
        .card.legendary { background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 0 30px rgba(245, 158, 11, 0.5); }

        .card-icon { font-size: 3rem; margin-bottom: 5px; }
        .card-name { font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; }
        .card-stats { font-size: 0.7rem; }
        .card-atk { color: #ff6b6b; }
        .card-def { color: #4ecdc4; }

        .rarity-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-top: 5px;
        }
        .rarity-tag.common { background: #7a7a7a; }
        .rarity-tag.rare { background: #00d9ff; }
        .rarity-tag.epic { background: #a855f7; }
        .rarity-tag.legendary { background: #f59e0b; }

        .boss-card {
            background: linear-gradient(135deg, #2d1b4e, #4a1942);
            border-radius: 16px;
            padding: 20px;
            width: 150px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .boss-icon { font-size: 4rem; }
        .boss-name { font-size: 1rem; font-weight: bold; margin: 10px 0 5px; color: #ff6b6b; }
        .boss-hp-bar {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            margin: 8px 0;
            overflow: hidden;
        }
        .boss-hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #fee140);
            transition: width 0.5s ease;
        }

        /* Hand */
        .hand-section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .hand-title {
            font-size: 0.9rem;
            color: #8892b0;
            margin-bottom: 10px;
        }

        .hand-cards {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            min-height: 80px;
        }

        .hand-card {
            width: 60px;
            height: 85px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .hand-card:hover {
            transform: translateY(-5px);
        }

        .hand-card.selected {
            transform: translateY(-10px);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
        }

        .hand-card-icon { font-size: 1.5rem; }
        .hand-card-atk { font-size: 0.7rem; color: #ff6b6b; }

        /* Battle Log */
        .battle-log {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 15px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        .log-entry { margin-bottom: 5px; padding: 5px 10px; border-radius: 5px; }
        .log-entry.damage { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
        .log-entry.heal { background: rgba(78, 205, 196, 0.2); color: #4ecdc4; }
        .log-entry.gold { background: rgba(255, 217, 61, 0.2); color: #fee140; }
        .log-entry.card { background: rgba(0, 217, 255, 0.2); color: #00d9ff; }
        .log-entry.system { background: rgba(168, 85, 247, 0.2); color: #a855f7; }

        /* GM Panel */
        .gm-panel {
            display: none;
            background: rgba(102, 126, 234, 0.1);
            border: 2px solid #667eea;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .gm-panel.show { display: block; }

        .gm-title {
            font-size: 1.2rem;
            color: #667eea;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .gm-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .gm-field {
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 10px;
        }

        .gm-field label {
            font-size: 0.8rem;
            color: #8892b0;
            display: block;
            margin-bottom: 5px;
        }

        .gm-field input {
            width: 100%;
            padding: 8px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #1a1a2e;
            color: #fff;
            font-size: 1rem;
        }

        .gm-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-apply { background: #667eea; color: #fff; }
        .btn-reset { background: #ff6b6b; color: #fff; }

        /* Controls */
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Win/Lose Overlay */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .overlay.show { display: flex; }

        .overlay-content {
            background: rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .overlay-icon { font-size: 5rem; }
        .overlay-title { font-size: 2rem; margin: 20px 0; }
        .overlay-desc { color: #8892b0; margin-bottom: 20px; }
        .overlay-gold { color: #fee140; font-size: 1.2rem; margin-bottom: 20px; }

        /* Player HP */
        .player-hp-section {
            margin-top: 10px;
        }

        .hp-bar {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }

        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #00d9ff);
            transition: width 0.3s;
        }

        .hp-text {
            font-size: 0.75rem;
            color: #8892b0;
            margin-top: 3px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Header -->
        <div class="header">
            <div class="player-stats">
                <div class="stat">
                    <div class="stat-value" id="gold">0</div>
                    <div class="stat-label">💰 金幣</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="level">1</div>
                    <div class="stat-label">⭐ 等級</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="wins">0</div>
                    <div class="stat-label">🏆 勝場</div>
                </div>
            </div>
            <div class="controls">
                <button class="btn btn-draw" onclick="drawCard()">🎴 抽卡 (50💰)</button>
                <button class="btn btn-gm" onclick="toggleGM()">⚙️ GM</button>
            </div>
        </div>

        <!-- Player HP -->
        <div class="player-hp-section">
            <div class="hp-bar"><div class="hp-fill" id="playerHpFill" style="width:100%"></div></div>
            <div class="hp-text">❤️ HP: <span id="playerHp">100</span>/<span id="playerMaxHp">100</span></div>
        </div>

        <!-- Battle Area -->
        <div class="battle-area">
            <div class="card-box">
                <div class="hand-title">🎴 你的手牌</div>
                <div id="cardArea">
                    <div style="color:#8892b0">還沒有卡牌，點擊抽卡！</div>
                </div>
            </div>
            <div class="boss-box">
                <div class="hand-title">👹 Boss</div>
                <div id="bossArea">
                    <div style="color:#8892b0">點擊「挑戰Boss」開始戰鬥！</div>
                </div>
            </div>
        </div>

        <!-- Hand -->
        <div class="hand-section">
            <div class="hand-title">🃏 裝備中的卡牌（點擊選擇攻擊）</div>
            <div class="hand-cards" id="handCards"></div>
        </div>

        <!-- Battle Log -->
        <div class="battle-log" id="battleLog">
            <div class="log-entry system">🎮 歡迎來到卡牌RPG！點擊抽卡開始冒險！</div>
        </div>

        <!-- GM Panel -->
        <div class="gm-panel" id="gmPanel">
            <div class="gm-title">⚙️ GM 控制台</div>
            <div class="gm-grid">
                <div class="gm-field">
                    <label>💰 金幣</label>
                    <input type="number" id="gmGold" value="0">
                </div>
                <div class="gm-field">
                    <label>❤️ 玩家HP</label>
                    <input type="number" id="gmPlayerHp" value="100">
                </div>
                <div class="gm-field">
                    <label>⭐ 等級</label>
                    <input type="number" id="gmLevel" value="1">
                </div>
                <div class="gm-field">
                    <label>💥 玩家攻擊</label>
                    <input type="number" id="gmPlayerAtk" value="10">
                </div>
                <div class="gm-field">
                    <label>🛡️ 玩家防禦</label>
                    <input type="number" id="gmPlayerDef" value="5">
                </div>
                <div class="gm-field">
                    <label>👹 Boss HP</label>
                    <input type="number" id="gmBossHp" value="100">
                </div>
                <div class="gm-field">
                    <label>👹 Boss 攻擊</label>
                    <input type="number" id="gmBossAtk" value="15">
                </div>
                <div class="gm-field">
                    <label>🎴 抽卡費用</label>
                    <input type="number" id="gmDrawCost" value="50">
                </div>
            </div>
            <div class="gm-actions">
                <button class="btn btn-apply" onclick="applyGM()">✅ 應用</button>
                <button class="btn btn-reset" onclick="resetGM()">🔄 重置</button>
                <button class="btn" onclick="toggleGM()" style="background:#333;color:#fff;">關閉</button>
            </div>
        </div>

        <!-- Boss Challenge Button -->
        <div class="controls" style="margin-top:10px;">
            <button class="btn btn-attack" onclick="spawnBoss()">👹 挑戰Boss</button>
            <button class="btn" onclick="useCard()" style="background:#4ecdc4;color:#1a1a2e;">⚔️ 出牌攻擊</button>
            <button class="btn" onclick="skipTurn()" style="background:#333;color:#fff;">⏭️ 跳過回合</button>
        </div>
    </div>

    <!-- Win Overlay -->
    <div class="overlay" id="winOverlay">
        <div class="overlay-content">
            <div class="overlay-icon">🏆</div>
            <div class="overlay-title">戰鬥勝利！</div>
            <div class="overlay-gold" id="winGold">+100 💰</div>
            <button class="btn btn-attack" onclick="closeOverlay()">繼續挑戰</button>
        </div>
    </div>

    <!-- Lose Overlay -->
    <div class="overlay" id="loseOverlay">
        <div class="overlay-content">
            <div class="overlay-icon">💀</div>
            <div class="overlay-title">你被打敗了...</div>
            <div class="overlay-desc">HP 歸零了！</div>
            <button class="btn btn-draw" onclick="revive()">🔄 复活 (免費)</button>
        </div>
    </div>

    <script>
        // Game State
        let game = {
            gold: 0,
            level: 1,
            wins: 0,
            playerHp: 100,
            playerMaxHp: 100,
            playerAtk: 10,
            playerDef: 5,
            hand: [],
            boss: null,
            selectedCard: null,
            drawCost: 50,
            gmPassword: 'gm999',
            gmOpen: false
        };

        // Card Templates
        const cardTemplates = [
            { name: '小劍', icon: '🗡️', atk: 5, def: 0, rarity: 'common' },
            { name: '盾牌', icon: '🛡️', atk: 0, def: 5, rarity: 'common' },
            { name: '弓箭', icon: '🏹', atk: 7, def: 0, rarity: 'common' },
            { name: '魔法杖', icon: '🔮', atk: 8, def: 2, rarity: 'common' },
            { name: '火焰劍', icon: '🔥', atk: 12, def: 3, rarity: 'rare' },
            { name: '寒冰盾', icon: '❄️', atk: 3, def: 10, rarity: 'rare' },
            { name: '雷神之鎚', icon: '⚡', atk: 18, def: 5, rarity: 'epic' },
            { name: '龍鱗甲', icon: '🐉', atk: 5, def: 18, rarity: 'epic' },
            { name: '毀滅者', icon: '💀', atk: 30, def: 10, rarity: 'legendary' },
            { name: '天使守護', icon: '👼', atk: 10, def: 25, rarity: 'legendary' }
        ];

        // Boss Templates
        const bossTemplates = [
            { name: '哥布林', icon: '👺', hp: 50, atk: 8, reward: 50 },
            { name: '狼人', icon: '🐺', hp: 80, atk: 12, reward: 80 },
            { name: '巨魔', icon: '👹', hp: 120, atk: 15, reward: 120 },
            { name: '暗龍', icon: '🐉', hp: 200, atk: 20, reward: 200 },
            { name: '深淵領主', icon: '👿', hp: 350, atk: 25, reward: 350 },
            { name: '虛空之王', icon: '💀', hp: 500, atk: 35, reward: 500 }
        ];

        // Rarity Weights
        function getRandomCard() {
            const rand = Math.random();
            let pool;
            if (rand < 0.5) pool = cardTemplates.filter(c => c.rarity === 'common');
            else if (rand < 0.75) pool = cardTemplates.filter(c => c.rarity === 'rare');
            else if (rand < 0.95) pool = cardTemplates.filter(c => c.rarity === 'epic');
            else pool = cardTemplates.filter(c => c.rarity === 'legendary');
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function drawCard() {
            if (game.gold < game.drawCost) {
                addLog('⚠️ 金幣不足！需要 ' + game.drawCost + ' 💰', 'system');
                return;
            }
            game.gold -= game.drawCost;
            updateStats();

            const card = getRandomCard();
            card.id = Date.now();
            game.hand.push(card);
            addLog('🎴 抽到 [' + card.rarity.toUpperCase() + '] ' + card.icon + ' ' + card.name + ' (ATK:' + card.atk + ' DEF:' + card.def + ')', 'card');
            renderHand();
        }

        function renderHand() {
            const container = document.getElementById('handCards');
            container.innerHTML = '';
            game.hand.forEach((card, idx) => {
                const div = document.createElement('div');
                div.className = 'hand-card ' + card.rarity + (game.selectedCard === idx ? ' selected' : '');
                div.innerHTML = '<div class="hand-card-icon">' + card.icon + '</div><div class="hand-card-atk">⚔️' + card.atk + '</div>';
                div.onclick = () => selectCard(idx);
                container.appendChild(div);
            });
        }

        function selectCard(idx) {
            game.selectedCard = idx;
            renderHand();
            addLog('🃏 選擇了 ' + game.hand[idx].icon + ' ' + game.hand[idx].name, 'card');
        }

        function spawnBoss() {
            const bossLevel = Math.min(game.level, bossTemplates.length);
            const template = bossTemplates[bossLevel - 1];
            const scaling = 1 + (game.level - 1) * 0.3;
            game.boss = {
                ...template,
                hp: Math.floor(template.hp * scaling),
                maxHp: Math.floor(template.hp * scaling),
                atk: Math.floor(template.atk * scaling)
            };
            game.selectedCard = null;

            const bossArea = document.getElementById('bossArea');
            bossArea.innerHTML = `
                <div class="boss-card">
                    <div class="boss-icon">${game.boss.icon}</div>
                    <div class="boss-name">Lv.${game.level} ${game.boss.name}</div>
                    <div class="boss-hp-bar"><div class="boss-hp-fill" id="bossHpFill" style="width:100%"></div></div>
                    <div style="font-size:0.8rem">❤️ ${game.boss.hp}/${game.boss.maxHp} | ⚔️ ${game.boss.atk}</div>
                </div>
            `;
            game.hand = [];
            game.selectedCard = null;
            renderHand();
            addLog('👹 遇到了 Lv.' + game.level + ' ' + game.boss.name + '！(HP:' + game.boss.hp + ' ATK:' + game.boss.atk + ')', 'damage');
        }

        function useCard() {
            if (!game.boss) {
                addLog('⚠️ 先挑戰Boss！', 'system');
                return;
            }
            if (game.selectedCard === null) {
                addLog('⚠️ 選擇一張手牌！', 'system');
                return;
            }

            const card = game.hand[game.selectedCard];
            const damage = card.atk + game.playerAtk;
            game.boss.hp -= damage;
            game.hand.splice(game.selectedCard, 1);
            game.selectedCard = null;

            addLog('⚔️ ' + card.icon + ' ' + card.name + ' 攻擊造成 ' + damage + ' 傷害！', 'damage');

            if (game.boss.hp <= 0) {
                winBoss();
            } else {
                bossAttack();
                renderHand();
            }
            updateBossHp();
        }

        function skipTurn() {
            if (!game.boss) {
                addLog('⚠️ 先挑戰Boss！', 'system');
                return;
            }
            addLog('⏭️ 跳過攻擊，Boss反擊！', 'system');
            bossAttack();
        }

        function bossAttack() {
            let damage = Math.max(1, game.boss.atk - game.playerDef);
            if (game.selectedCard !== null) {
                const def = game.hand[game.selectedCard].def;
                damage = Math.max(1, damage - def);
                addLog('🛡️ 裝備 ' + game.hand[game.selectedCard].icon + ' 抵擋了部分傷害！', 'heal');
            }
            game.playerHp -= damage;
            addLog('👹 ' + game.boss.name + ' 攻擊造成 ' + damage + ' 傷害！', 'damage');
            updatePlayerHp();

            if (game.playerHp <= 0) {
                loseGame();
            }
        }

        function winBoss() {
            const reward = game.boss.reward + game.level * 20;
            game.gold += reward;
            game.wins++;
            if (game.wins % 3 === 0) game.level++;
            game.playerHp = Math.min(game.playerHp + 30, game.playerMaxHp);
            game.boss = null;

            document.getElementById('winGold').textContent = '+' + reward + ' 💰';
            document.getElementById('winOverlay').classList.add('show');
            addLog('🏆 擊敗Boss！獲得 ' + reward + ' 金幣！', 'gold');
            updateStats();
        }

        function loseGame() {
            document.getElementById('loseOverlay').classList.add('show');
            addLog('💀 你被打敗了...', 'damage');
        }

        function revive() {
            game.playerHp = game.playerMaxHp;
            game.boss = null;
            game.hand = [];
            document.getElementById('loseOverlay').classList.remove('show');
            document.getElementById('bossArea').innerHTML = '<div style="color:#8892b0">Boss已被驅逐！再挑戰一次！</div>';
            renderHand();
            updatePlayerHp();
            addLog('🔄 复活！HP 回滿！', 'heal');
        }

        function closeOverlay() {
            document.getElementById('winOverlay').classList.remove('show');
            game.boss = null;
            document.getElementById('bossArea').innerHTML = '<div style="color:#8892b0">挑戰下一個Boss！</div>';
        }

        function updateStats() {
            document.getElementById('gold').textContent = game.gold;
            document.getElementById('level').textContent = game.level;
            document.getElementById('wins').textContent = game.wins;
        }

        function updatePlayerHp() {
            const pct = Math.max(0, (game.playerHp / game.playerMaxHp) * 100);
            document.getElementById('playerHp').textContent = Math.max(0, game.playerHp);
            document.getElementById('playerMaxHp').textContent = game.playerMaxHp;
            document.getElementById('playerHpFill').style.width = pct + '%';
        }

        function updateBossHp() {
            if (!game.boss) return;
            const pct = Math.max(0, (game.boss.hp / game.boss.maxHp) * 100);
            const fill = document.getElementById('bossHpFill');
            if (fill) fill.style.width = pct + '%';
        }

        function addLog(msg, type) {
            const log = document.getElementById('battleLog');
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            entry.textContent = msg;
            log.insertBefore(entry, log.firstChild);
        }

        // GM Panel
        function toggleGM() {
            if (!game.gmOpen) {
                const pwd = prompt('輸入GM密碼：');
                if (pwd !== game.gmPassword) {
                    addLog('❌ GM密碼錯誤！', 'system');
                    return;
                }
                game.gmOpen = true;
            }
            const panel = document.getElementById('gmPanel');
            panel.classList.toggle('show');
            if (game.gmOpen) {
                document.getElementById('gmGold').value = game.gold;
                document.getElementById('gmPlayerHp').value = game.playerMaxHp;
                document.getElementById('gmLevel').value = game.level;
                document.getElementById('gmPlayerAtk').value = game.playerAtk;
                document.getElementById('gmPlayerDef').value = game.playerDef;
                document.getElementById('gmBossHp').value = game.boss ? game.boss.maxHp : 100;
                document.getElementById('gmBossAtk').value = game.boss ? game.boss.atk : 15;
                document.getElementById('gmDrawCost').value = game.drawCost;
            }
        }

        function applyGM() {
            game.gold = parseInt(document.getElementById('gmGold').value) || 0;
            game.playerMaxHp = parseInt(document.getElementById('gmPlayerHp').value) || 100;
            game.playerHp = Math.min(game.playerHp, game.playerMaxHp);
            game.level = parseInt(document.getElementById('gmLevel').value) || 1;
            game.playerAtk = parseInt(document.getElementById('gmPlayerAtk').value) || 10;
            game.playerDef = parseInt(document.getElementById('gmPlayerDef').value) || 5;
            game.drawCost = parseInt(document.getElementById('gmDrawCost').value) || 50;

            if (game.boss) {
                game.boss.maxHp = parseInt(document.getElementById('gmBossHp').value) || 100;
                game.boss.hp = Math.min(game.boss.hp, game.boss.maxHp);
                game.boss.atk = parseInt(document.getElementById('gmBossAtk').value) || 15;
            }

            updateStats();
            updatePlayerHp();
            if (game.boss) updateBossHp();
            addLog('⚙️ GM設定已應用！', 'system');
        }

        function resetGM() {
            game.gold = 0;
            game.level = 1;
            game.wins = 0;
            game.playerHp = 100;
            game.playerMaxHp = 100;
            game.playerAtk = 10;
            game.playerDef = 5;
            game.hand = [];
            game.boss = null;
            game.drawCost = 50;
            updateStats();
            updatePlayerHp();
            document.getElementById('bossArea').innerHTML = '<div style="color:#8892b0">已重置！</div>';
            renderHand();
            addLog('🔄 GM已重置遊戲！', 'system');
        }
    </script>
</body>
</html>
