# tools/registry.yaml
# OpenClaw 工具註冊表 — Harness Engineering
# 版本：1.1.0 | 更新：2026-04-08
# 新增：上下文自動壓縮優化（借鑒 Claude Code）

tools:
  # ===== 研究類工具 =====
  web_search:
    name: web_search
    description: 網頁搜尋（使用 Tavily）
    category: research
    risk_level: low
    auth_required: false
    confirmation_required: false
    quota_cost: medium

  web_fetch:
    name: web_fetch
    description: 擷取網頁內容（HTML → markdown）
    category: research
    risk_level: low
    auth_required: false
    confirmation_required: false

  tavily_search:
    name: tavily_search
    description: Tavily AI 優化搜尋
    category: research
    risk_level: low
    auth_required: true
    confirmation_required: false

  tavily_crawl:
    name: tavily_crawl
    description: 深度爬取網站（多頁面）
    category: research
    risk_level: low
    auth_required: true
    confirmation_required: false

  tavily_extract:
    name: tavily_extract
    description: 精準提取特定 URL 內容
    category: research
    risk_level: low
    auth_required: true
    confirmation_required: false

  tavily_research:
    name: tavily_research
    description: 深度研究報告（多源綜合）
    category: research
    risk_level: low
    auth_required: true
    confirmation_required: false
    timeout: long  # 30-120 秒

  # ===== 檔案 I/O 工具 =====
  file_read:
    name: read
    description: 讀取檔案內容
    category: file_io
    risk_level: low
    auth_required: false
    confirmation_required: false
    path_restriction: null  # 全部可讀

  file_write:
    name: write
    description: 寫入或建立檔案
    category: file_io
    risk_level: medium
    auth_required: false
    confirmation_required: true
    path_rules:
      - pattern: "~/.openclaw/workspace/**"
        allow: true
      - pattern: "~/.openclaw/workspace/**/*.md"
        allow: true
      - pattern: "~/.openclaw/workspace/**/*.pdf"
        allow: true
      - pattern: "/system/**"
        allow: false
      - pattern: "~/.openclaw/config/**"
        allow: false

  file_edit:
    name: edit
    description: 編輯現有檔案（精確取代）
    category: file_io
    risk_level: medium
    auth_required: false
    confirmation_required: true
    path_rules:
      - pattern: "~/.openclaw/workspace/**"
        allow: true
      - pattern: "~/.openclaw/config/**"
        allow: false

  file_delete:
    name: trash_email (email) / delete_file (drive)
    description: 刪除檔案或郵件
    category: file_io
    risk_level: high
    auth_required: false
    confirmation_required: true
    allow_on_first_confirm: false

  exec_shell:
    name: exec
    description: 執行 Shell 命令
    category: system
    risk_level: high
    auth_required: false
    confirmation_required: true
    elevated_required: true
    denied_commands:
      - "rm -rf /"
      - "dd if=*"
      - "mkfs"
      - "drop table"

  # ===== 通訊工具 =====
  send_email:
    name: send_email
    description: 發送郵件
    category: communication
    risk_level: high
    auth_required: true
    confirmation_required: true
    allow_on_first_confirm: false
    audit_log: true

  reply_email:
    name: reply_to_email
    description: 回覆郵件
    category: communication
    risk_level: high
    auth_required: true
    confirmation_required: true
    audit_log: true

  discord_message:
    name: (Discord channel routing)
    description: 發送 Discord 訊息
    category: communication
    risk_level: medium
    auth_required: true
    confirmation_required: false  # 已確認來自授權用戶

  # ===== 企業文書工具 =====
