  list_labels:
    name: list_labels
    description: 列出 Gmail 標籤
    category: productivity
    risk_level: low
    auth_required: true
    confirmation_required: false

# ===== 風險分級說明 =====
risk_levels:
  low:
    description: 無直接風險（讀取、搜尋、查詢）
    default_action: auto_execute
  
  medium:
    description: 有限風險（寫入、建立、修改）
    default_action: confirm_then_execute
  
  high:
    description: 高風險（刪除、對外發送、系統級操作）
    default_action: require_explicit_authorization

# ===== 類別分組 =====
categories:
  research: 研究工具（搜尋、爬取、分析）
  file_io: 檔案操作（讀寫、編輯、刪除）
  communication: 通訊工具（郵件、訊息）
  productivity: 企業文書（Doc、Sheet、Slide）
  calendar: 行事曆
  crm: 客戶關係
  coordination: 代理協調
  scheduling: 排程
  media: 圖片/媒體
  system: 系統級

# ===== 上下文管理（Token 優化）=====
context_management:
  enabled: true
  description: "自動管理對話上下文，防止 Token 過度消耗"

  # 自動壓縮設定
  auto_compact:
    enabled: true
    threshold: 150000      # 開始壓縮的 token 數
    target: 100000        # 壓縮後的目標 token 數
    preserve_recent: 20   # 保留最近 N 條對話
    compress_system_prompt: false  # 是否壓縮系統提示詞

  # 配額監控
  quota_monitoring:
    enabled: true
    warning_threshold: 0.8   # 80% 時發出警告
    critical_threshold: 0.95 # 95% 時暫停非必要操作

  # MiniMax 專用設定（可調整）
  minimax:
    context_window: 1000000  # MiniMax 上下文窗口
    recommended_compact_threshold: 150000  # 建議壓縮閾值
    max_tokens_per_response: 8192

  # 壓縮策略
  compaction_strategy:
    - name: "aggressive"
      threshold: 200000
      target: 80000
      description: "積極壓縮，適用於長任務"
    - name: "moderate"
      threshold: 150000
      target: 100000
      description: "適中壓縮，預設策略"
    - name: "conservative"
      threshold: 100000
      target: 70000
      description: "保守壓縮，保留更多上下文"
