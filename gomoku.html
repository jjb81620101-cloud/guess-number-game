<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五子棋 - AI / 雙人對戰</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  color: #e0e0e0;
}
h1 {
  color: #00d9ff;
  margin-bottom: 15px;
  font-size: 1.8em;
}
.controls {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  justify-content: center;
}
button {
  padding: 10px 20px;
  font-size: 1em;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s;
  font-family: inherit;
}
.btn-mode {
  background: #00d9ff;
  color: #1a1a2e;
}
.btn-mode.active {
  background: #ffd700;
  color: #1a1a2e;
}
.btn-reset {
  background: #ff5050;
  color: white;
}
.btn-reset:hover {
  background: #ff7070;
}
.game-info {
  display: flex;
  gap: 20px;
  margin-bottom: 15px;
  font-size: 1.1em;
}
.current-player {
  padding: 8px 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
}
.current-player.black {
  border: 2px solid #333;
  background: #333;
}
.current-player.white {
  border: 2px solid #fff;
  background: #fff;
}
#board {
  border: 3px solid #8B4513;
  border-radius: 8px;
  background: #DEB887;
  cursor: pointer;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
.message {
  margin-top: 15px;
  font-size: 1.3em;
  padding: 10px 25px;
  border-radius: 10px;
  background: rgba(255,255,255,0.1);
  min-height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.message.win {
  background: rgba(0,255,136,0.2);
  color: #00ff88;
  animation: pulse 0.5s ease-in-out;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
.stone {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 10px;
  vertical-align: middle;
}
.stone.black {
  background: #333;
  box-shadow: inset -3px -3px 5px rgba(0,0,0,0.5);
}
.stone.white {
  background: #fff;
  box-shadow: inset -3px -3px 5px rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<h1>🎮 五子棋</h1>

<div class="controls">
  <button class="btn-mode active" id="btn-pvp" onclick="setMode('pvp')">👥 雙人對戰</button>
  <button class="btn-mode" id="btn-ai" onclick="setMode('ai')">🤖 AI 對戰</button>
  <button class="btn-reset" onclick="resetGame()">🔄 重新開始</button>
</div>

<div class="game-info">
  <div class="current-player black" id="player-display">
    <span class="stone black" id="stone-icon"></span>
    <span id="player-text">黑子先行</span>
  </div>
</div>

<canvas id="board" width="480" height="480"></canvas>

<div class="message" id="message">點擊棋盤開始遊戲</div>

<script>
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const GRID_SIZE = 15;
const CELL_SIZE = canvas.width / (GRID_SIZE + 1);
const STONE_RADIUS = CELL_SIZE * 0.42;
const OFFSET = CELL_SIZE;

let board = [];
let currentPlayer = 'black';
let gameOver = false;
let mode = 'pvp';
let aiThinking = false;

function initBoard() {
  board = [];
  for (let i = 0; i < GRID_SIZE; i++) {
    board[i] = [];
    for (let j = 0; j < GRID_SIZE; j++) {
      board[i][j] = null;
    }
  }
}

function drawBoard() {
  // 背景木紋
  ctx.fillStyle = '#DEB887';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // 木紋效果
  ctx.strokeStyle = 'rgba(139, 69, 19, 0.1)';
  ctx.lineWidth = 1;
  for (let i = 0; i < canvas.height; i += 3) {
    ctx.beginPath();
    ctx.moveTo(0, i);
    ctx.lineTo(canvas.width, i);
    ctx.stroke();
  }
  
  // 網格線
  ctx.strokeStyle = '#8B4513';
  ctx.lineWidth = 1;
  
  for (let i = 0; i < GRID_SIZE; i++) {
    // 垂直線
    ctx.beginPath();
    ctx.moveTo(OFFSET + i * CELL_SIZE, OFFSET);
    ctx.lineTo(OFFSET + i * CELL_SIZE, OFFSET + (GRID_SIZE - 1) * CELL_SIZE);
    ctx.stroke();
    
    // 水平線
    ctx.beginPath();
    ctx.moveTo(OFFSET, OFFSET + i * CELL_SIZE);
    ctx.lineTo(OFFSET + (GRID_SIZE - 1) * CELL_SIZE, OFFSET + i * CELL_SIZE);
    ctx.stroke();
  }
  
  // 星位（天元和四個角星）
  const starPoints = [
    [3, 3], [3, 11], [11, 3], [11, 11], [7, 7]
  ];
  ctx.fillStyle = '#8B4513';
  starPoints.forEach(([x, y]) => {
    ctx.beginPath();
    ctx.arc(OFFSET + x * CELL_SIZE, OFFSET + y * CELL_SIZE, 5, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawStone(x, y, color) {
  const cx = OFFSET + x * CELL_SIZE;
  const cy = OFFSET + y * CELL_SIZE;
  
  // 陰影
  ctx.beginPath();
  ctx.arc(cx + 2, cy + 2, STONE_RADIUS, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();
  
  // 棋子本體
  ctx.beginPath();
  ctx.arc(cx, cy, STONE_RADIUS, 0, Math.PI * 2);
  const gradient = ctx.createRadialGradient(cx - 4, cy - 4, 0, cx, cy, STONE_RADIUS);
  if (color === 'black') {
    gradient.addColorStop(0, '#555');
    gradient.addColorStop(0.5, '#333');
    gradient.addColorStop(1, '#1a1a1a');
  } else {
    gradient.addColorStop(0, '#ffffff');
    gradient.addColorStop(0.5, '#f0f0f0');
    gradient.addColorStop(1, '#cccccc');
  }
  ctx.fillStyle = gradient;
  ctx.fill();
  
  // 棋子邊框
  ctx.strokeStyle = color === 'black' ? '#000' : '#999';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function redrawAll() {
  drawBoard();
  for (let i = 0; i < GRID_SIZE; i++) {
    for (let j = 0; j < GRID_SIZE; j++) {
      if (board[i][j]) {
        drawStone(i, j, board[i][j]);
      }
    }
  }
}

function getGridPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;
  
  const gridX = Math.round((x - OFFSET) / CELL_SIZE);
  const gridY = Math.round((y - OFFSET) / CELL_SIZE);
  
  if (gridX >= 0 && gridX < GRID_SIZE && gridY >= 0 && gridY < GRID_SIZE) {
    return [gridX, gridY];
  }
  return null;
}

function checkWin(x, y, color) {
  const directions = [
    [1, 0],   // 橫向
    [0, 1],   // 縱向
    [1, 1],   // 斜向右下
    [1, -1]   // 斜向左下
  ];
  
  for (const [dx, dy] of directions) {
    let count = 1;
    
    // 正方向
    for (let i = 1; i < 5; i++) {
      const nx = x + dx * i;
      const ny = y + dy * i;
      if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE && board[nx][ny] === color) {
        count++;
      } else break;
    }
    
    // 反方向
    for (let i = 1; i < 5; i++) {
      const nx = x - dx * i;
      const ny = y - dy * i;
      if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE && board[nx][ny] === color) {
        count++;
      } else break;
    }
    
    if (count >= 5) return true;
  }
  return false;
}

function updateDisplay() {
  const display = document.getElementById('player-display');
  const stoneIcon = document.getElementById('stone-icon');
  const text = document.getElementById('player-text');
  
  display.className = 'current-player ' + currentPlayer;
  stoneIcon.className = 'stone ' + currentPlayer;
  text.textContent = currentPlayer === 'black' ? '黑子' : '白子';
}

function showMessage(msg, isWin = false) {
  const msgEl = document.getElementById('message');
  const color = currentPlayer === 'black' ? 'black' : 'white';
  msgEl.innerHTML = isWin 
    ? `<span class="stone ${color}"></span>${msg}` 
    : msg;
  msgEl.className = 'message' + (isWin ? ' win' : '');
}

function placeStone(x, y) {
  if (gameOver || board[x][y] || aiThinking) return false;
  
  board[x][y] = currentPlayer;
  redrawAll();
  
  if (checkWin(x, y, currentPlayer)) {
    gameOver = true;
    const winner = currentPlayer === 'black' ? '黑子' : '白子';
    showMessage(`🎉 ${winner}勝利！`, true);
    return true;
  }
  
  // 檢查平手
  let isDraw = true;
  for (let i = 0; i < GRID_SIZE; i++) {
    for (let j = 0; j < GRID_SIZE; j++) {
      if (!board[i][j]) {
        isDraw = false;
        break;
      }
    }
    if (!isDraw) break;
  }
  if (isDraw) {
    gameOver = true;
    showMessage('🤝 平手！', true);
    return true;
  }
  
  currentPlayer = currentPlayer === 'black' ? 'white' : 'black';
  updateDisplay();
  return true;
}

function evaluatePosition(x, y, color) {
  let score = 0;
  const directions = [[1, 0], [0, 1], [1, 1], [1, -1]];
  
  for (const [dx, dy] of directions) {
    let count = 1;
    let openEnds = 0;
    
    // 正方向
    for (let i = 1; i <= 4; i++) {
      const nx = x + dx * i;
      const ny = y + dy * i;
      if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE) {
        if (board[nx][ny] === color) count++;
        else if (board[nx][ny] === null) {
          openEnds++;
          break;
        } else break;
      }
    }
    
    // 反方向
    for (let i = 1; i <= 4; i++) {
      const nx = x - dx * i;
      const ny = y - dy * i;
      if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE) {
        if (board[nx][ny] === color) count++;
        else if (board[nx][ny] === null) {
          openEnds++;
          break;
        } else break;
      }
    }
    
    if (count >= 5) score += 100000;
    else if (count === 4 && openEnds === 2) score += 10000;
    else if (count === 4 && openEnds === 1) score += 1000;
    else if (count === 3 && openEnds === 2) score += 1000;
    else if (count === 3 && openEnds === 1) score += 100;
    else if (count === 2 && openEnds === 2) score += 100;
  }
  
  // 中心加分
  const center = Math.floor(GRID_SIZE / 2);
  const distFromCenter = Math.abs(x - center) + Math.abs(y - center);
  score += (14 - distFromCenter) * 2;
  
  return score;
}

function aiMove() {
  aiThinking = true;
  showMessage('🤖 AI 思考中...');
  
  setTimeout(() => {
    const opponent = currentPlayer;
    
    // 檢查 AI 是否能贏
    for (let i = 0; i < GRID_SIZE; i++) {
      for (let j = 0; j < GRID_SIZE; j++) {
        if (!board[i][j]) {
          board[i][j] = opponent;
          if (checkWin(i, j, opponent)) {
            board[i][j] = null;
            aiThinking = false;
            placeStone(i, j);
            return;
          }
          board[i][j] = null;
        }
      }
    }
    
    // 檢查玩家是否即將贏
    const player = 'black';
    for (let i = 0; i < GRID_SIZE; i++) {
      for (let j = 0; j < GRID_SIZE; j++) {
        if (!board[i][j]) {
          board[i][j] = player;
          if (checkWin(i, j, player)) {
            board[i][j] = null;
            aiThinking = false;
            placeStone(i, j);
            return;
          }
          board[i][j] = null;
        }
      }
    }
    
    // 找最佳位置
    let bestScore = -Infinity;
    let bestMove = null;
    
    for (let i = 0; i < GRID_SIZE; i++) {
      for (let j = 0; j < GRID_SIZE; j++) {
        if (!board[i][j]) {
          const aiScore = evaluatePosition(i, j, opponent);
          const playerScore = evaluatePosition(i, j, player);
          const totalScore = aiScore * 1.1 + playerScore;
          
          if (totalScore > bestScore) {
            bestScore = totalScore;
            bestMove = [i, j];
          }
        }
      }
    }
    
    aiThinking = false;
    if (bestMove) {
      placeStone(bestMove[0], bestMove[1]);
    }
  }, 300);
}

canvas.addEventListener('click', (e) => {
  const pos = getGridPos(e);
  if (!pos) return;
  
  const [x, y] = pos;
  
  if (placeStone(x, y) && !gameOver && mode === 'ai' && currentPlayer === 'white') {
    aiMove();
  }
});

function setMode(newMode) {
  mode = newMode;
  document.getElementById('btn-pvp').classList.toggle('active', mode === 'pvp');
  document.getElementById('btn-ai').classList.toggle('active', mode === 'ai');
  resetGame();
}

function resetGame() {
  gameOver = false;
  currentPlayer = 'black';
  aiThinking = false;
  initBoard();
  redrawAll();
  updateDisplay();
  showMessage('點擊棋盤開始遊戲');
}

// 初始化
initBoard();
redrawAll();
updateDisplay();
</script>

</body>
</html>
